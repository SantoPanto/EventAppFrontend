<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand fw-bold" routerLink="/events">📅 EventApp</a>
    
    <div class="collapse navbar-collapse">
      <!-- Menü Linkleri -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/events" routerLinkActive="active">Tüm Etkinlikler</a>

        <li class="nav-item">
          <a class="nav-link" routerLink="/my-events" routerLinkActive="active">Kendi Etkinliklerim</a>

      </ul>

      <form class="d-flex mx-auto w-50 px-4" (submit)="$event.preventDefault(); onSearch(searchInput.value)">

      <div class="d-flex align-items-center text-white">
